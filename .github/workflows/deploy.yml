name: Deploy to GCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. application.properties 생성
      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          spring.application.name=capd-backend
          spring.datasource.url=jdbc:mysql://mysql:3306/capd_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
          spring.datasource.username=root
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.format_sql=false
          spring.jwt.secret=${{ secrets.JWT_SECRET }}
          spring.jwt.expiration=300000
          spring.jwt.refresh-token-expiration=1209600000
          cors.allowed-origins=http://localhost:3000,https://capd.site,https://www.capd.site,https://api.capd.site
          ml.api.base-url=http://capd-fastapi:8000
          gemini.api.key=${{ secrets.GEMINI_API_KEY }}
          gemini.model=gemini-2.5-flash-lite
          gcp.storage.bucket-name=${{ secrets.GCP_BUCKET_NAME }}
          gcp.storage.credentials-path=/home/jmo02_kim/gcp-credentials.json
          spring.mail.host=smtp.gmail.com
          spring.mail.port=587
          spring.mail.username=${{ secrets.MAIL_USERNAME }}
          spring.mail.password=${{ secrets.MAIL_PASSWORD }}
          spring.mail.properties.mail.smtp.auth=true
          spring.mail.properties.mail.smtp.starttls.enable=true
          spring.data.redis.host=redis
          spring.data.redis.port=6379
          EOF

      # 4. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. GCP 인증
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # 6. Docker를 GCP Artifact Registry에 인증
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      # 7. Spring Boot Docker 이미지 빌드 및 푸시
      - name: Build and Push Spring Boot Image
        run: |
          docker build -t asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-backend:latest .
          docker push asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-backend:latest

      # 8. FastAPI Docker 이미지 빌드 및 푸시
      - name: Build and Push FastAPI Image
        run: |
          docker build -t asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-fastapi:latest ./ml
          docker push asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-fastapi:latest

      # 9. SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      # 10. GCP 서비스 계정 키 전송
      - name: Copy GCP credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-credentials.json
          scp -i ~/.ssh/deploy_key \
            /tmp/gcp-credentials.json \
            ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_HOST }}:/home/jmo02_kim/gcp-credentials.json

      # 11. VM에서 컨테이너 실행
      - name: Deploy containers on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_HOST }} << 'ENDSSH'
            # GCP Artifact Registry 인증
            gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

            # Docker network 생성
            docker network create capd-network || true

            # 기존 컨테이너 중지 및 제거
            docker stop capd-backend || true
            docker rm capd-backend || true
            docker stop capd-fastapi || true
            docker rm capd-fastapi || true
            docker stop mysql || true
            docker rm mysql || true
            docker stop redis || true
            docker rm redis || true
            docker stop chromadb || true
            docker rm chromadb || true

            # 최신 이미지 pull
            docker pull asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-backend:latest
            docker pull asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-fastapi:latest

            # MySQL 컨테이너 실행
            docker run -d \
              --name mysql \
              --network capd-network \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_DATABASE=capd_db \
              -v /home/jmo02_kim/mysql-data:/var/lib/mysql \
              mysql:8.0

            # Redis 컨테이너 실행
            docker run -d \
              --name redis \
              --network capd-network \
              -v /home/jmo02_kim/redis-data:/data \
              redis:7.0

            # ChromaDB 컨테이너 실행
            docker run -d \
              --name chromadb \
              --network capd-network \
              -v /home/jmo02_kim/chromadb:/chroma/chroma \
              chromadb/chroma:latest

            # Spring Boot 컨테이너 실행
            docker run -d \
              --name capd-backend \
              --network capd-network \
              -p 8080:8080 \
              -v /home/jmo02_kim/gcp-credentials.json:/home/jmo02_kim/gcp-credentials.json \
              asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-backend:latest

            # FastAPI 컨테이너 실행
            docker run -d \
              --name capd-fastapi \
              --network capd-network \
              -p 8000:8000 \
              -v /home/jmo02_kim/models:/app/models \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              asia-northeast3-docker.pkg.dev/skuniv-training-1/capd-repo/capd-fastapi:latest
          ENDSSH