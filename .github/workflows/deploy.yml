name: Deploy to GCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Java 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. application.properties 생성
      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          spring.application.name=capd-backend
          spring.datasource.url=jdbc:mysql://localhost:3306/capd_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
          spring.datasource.username=root
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
          gemini.api.key=${{ secrets.GEMINI_API_KEY }}
          gemini.model=gemini-2.5-flash-lite
          gcp.storage.bucket-name=${{ secrets.GCP_BUCKET_NAME }}
          gcp.storage.credentials-path=/home/jmo02_kim/gcp-credentials.json
          ml.server.url=http://localhost:8000
          EOF

      # 4. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      # 6. JAR 파일 전송
      - name: Copy JAR to server
        run: |
          scp -i ~/.ssh/deploy_key \
            build/libs/*-SNAPSHOT.jar \
            ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_HOST }}:/home/jmo02_kim/app.jar

      # 7. GCP 서비스 계정 키 전송
      - name: Copy GCP credentials
        run: |
          scp -i ~/.ssh/deploy_key \
            src/main/resources/gcp-credentials.json \
            ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_HOST }}:/home/jmo02_kim/gcp-credentials.json

      # 8. 서버 재시작
      - name: Restart Spring Boot
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_HOST }} \
            "pkill -f 'java -jar' || true && \
             nohup java -jar /home/jmo02_kim/app.jar > /home/jmo02_kim/app.log 2>&1 &"